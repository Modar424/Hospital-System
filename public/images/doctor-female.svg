<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="400" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0FDF4"/>
      <stop offset="100%" stop-color="#CCFBF1"/>
    </linearGradient>
    <linearGradient id="coatGrad" x1="0" y1="280" x2="400" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0FDF4"/>
    </linearGradient>
    <linearGradient id="scrubGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F766E"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDDCB5"/>
      <stop offset="100%" stop-color="#F5C49A"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D2314"/>
      <stop offset="100%" stop-color="#5C3317"/>
    </linearGradient>
    <radialGradient id="shadowGrad" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#0D9488" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="bodyClip">
      <rect x="0" y="0" width="400" height="520"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="520" fill="url(#bgGrad)"/>

  <!-- Subtle decorative circles -->
  <circle cx="340" cy="80" r="60" fill="#0D9488" opacity="0.05"/>
  <circle cx="60" cy="400" r="80" fill="#0D9488" opacity="0.05"/>
  <circle cx="370" cy="420" r="40" fill="#0D9488" opacity="0.04"/>

  <!-- Shadow under figure -->
  <ellipse cx="200" cy="510" rx="100" ry="18" fill="url(#shadowGrad)"/>

  <!-- White coat - body (behind arms) -->
  <path d="M110 310 Q100 340 95 400 Q90 450 92 510 L308 510 Q310 450 305 400 Q300 340 290 310 Q260 300 200 298 Q140 300 110 310Z" fill="url(#coatGrad)" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Scrubs under coat -->
  <path d="M145 320 Q145 360 143 400 Q141 450 140 510 L260 510 Q259 450 257 400 Q255 360 255 320 Q230 310 200 310 Q170 310 145 320Z" fill="#0D9488" opacity="0.9"/>

  <!-- White coat lapels -->
  <path d="M145 310 L155 370 L200 360 L200 300 Q170 300 145 310Z" fill="white" stroke="#E2E8F0" stroke-width="1"/>
  <path d="M255 310 L245 370 L200 360 L200 300 Q230 300 255 310Z" fill="white" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Coat collar fold -->
  <path d="M165 315 Q175 340 200 350 Q225 340 235 315" fill="none" stroke="#CBD5E1" stroke-width="1" opacity="0.6"/>

  <!-- Left arm (coat) -->
  <path d="M110 310 Q80 330 72 380 Q68 410 75 430 L105 425 Q100 400 105 370 Q112 345 130 325Z" fill="url(#coatGrad)" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Right arm (coat) -->
  <path d="M290 310 Q320 330 328 380 Q332 410 325 430 L295 425 Q300 400 295 370 Q288 345 270 325Z" fill="url(#coatGrad)" stroke="#E2E8F0" stroke-width="1.5"/>

  <!-- Left hand holding stethoscope -->
  <ellipse cx="88" cy="435" rx="18" ry="14" fill="url(#skinGrad)"/>
  <path d="M75 432 Q80 445 95 445 Q105 440 100 430 Q90 425 78 428Z" fill="url(#skinGrad)"/>

  <!-- Right hand -->
  <ellipse cx="312" cy="435" rx="18" ry="14" fill="url(#skinGrad)"/>

  <!-- Stethoscope -->
  <path d="M88 432 Q88 390 120 370 Q160 355 170 320" fill="none" stroke="#374151" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M88 432 Q88 390 120 370 Q160 355 170 320" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round"/>
  <circle cx="175" cy="316" r="8" fill="#374151"/>
  <circle cx="175" cy="316" r="5" fill="#4B5563"/>
  <!-- Stethoscope right ear piece -->
  <path d="M170 320 Q165 305 158 298" fill="none" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <circle cx="156" cy="295" r="5" fill="#374151"/>

  <!-- Neck -->
  <rect x="184" y="215" width="32" height="45" rx="14" fill="url(#skinGrad)"/>

  <!-- Head -->
  <ellipse cx="200" cy="185" rx="62" ry="70" fill="url(#skinGrad)"/>

  <!-- Hair - back -->
  <ellipse cx="200" cy="165" rx="65" ry="72" fill="url(#hairGrad)"/>

  <!-- Hair bun or style at back -->
  <ellipse cx="200" cy="118" rx="52" ry="28" fill="url(#hairGrad)"/>

  <!-- Face - skin overlay on hair -->
  <ellipse cx="200" cy="192" rx="58" ry="62" fill="url(#skinGrad)"/>

  <!-- Hair top detail -->
  <path d="M142 170 Q148 130 165 115 Q182 108 200 112 Q218 108 235 115 Q252 130 258 170" fill="url(#hairGrad)"/>

  <!-- Hair side - left -->
  <path d="M142 170 Q135 200 138 230 Q142 245 148 255" fill="url(#hairGrad)" stroke="none"/>
  <!-- Hair side - right -->
  <path d="M258 170 Q265 200 262 230 Q258 245 252 255" fill="url(#hairGrad)" stroke="none"/>

  <!-- Ear left -->
  <ellipse cx="143" cy="200" rx="10" ry="13" fill="#F5C49A"/>
  <!-- Ear right -->
  <ellipse cx="257" cy="200" rx="10" ry="13" fill="#F5C49A"/>

  <!-- Earring left -->
  <circle cx="143" cy="207" r="4" fill="#0D9488"/>
  <!-- Earring right -->
  <circle cx="257" cy="207" r="4" fill="#0D9488"/>

  <!-- Eyes -->
  <!-- Left eye -->
  <ellipse cx="177" cy="192" rx="13" ry="10" fill="white"/>
  <ellipse cx="177" cy="193" rx="8" ry="8" fill="#3D2314"/>
  <ellipse cx="177" cy="193" rx="5" ry="5" fill="#1A0A00"/>
  <ellipse cx="180" cy="190" rx="2.5" ry="2.5" fill="white" opacity="0.8"/>

  <!-- Right eye -->
  <ellipse cx="223" cy="192" rx="13" ry="10" fill="white"/>
  <ellipse cx="223" cy="193" rx="8" ry="8" fill="#3D2314"/>
  <ellipse cx="223" cy="193" rx="5" ry="5" fill="#1A0A00"/>
  <ellipse cx="226" cy="190" rx="2.5" ry="2.5" fill="white" opacity="0.8"/>

  <!-- Eyebrows -->
  <path d="M163 181 Q177 176 190 179" stroke="#3D2314" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M210 179 Q223 176 237 181" stroke="#3D2314" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Nose -->
  <path d="M197 202 Q196 218 192 222 Q197 226 200 225 Q203 226 208 222 Q204 218 203 202" fill="#F0B080" opacity="0.5"/>
  <path d="M193 222 Q200 228 207 222" stroke="#E8A070" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Smile -->
  <path d="M183 238 Q200 250 217 238" stroke="#C8706A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Lips -->
  <path d="M185 237 Q192 243 200 242 Q208 243 215 237 Q208 234 200 234 Q192 234 185 237Z" fill="#D4847A" opacity="0.6"/>

  <!-- Cheek blush -->
  <ellipse cx="160" cy="220" rx="16" ry="10" fill="#FFB3A7" opacity="0.25"/>
  <ellipse cx="240" cy="220" rx="16" ry="10" fill="#FFB3A7" opacity="0.25"/>

  <!-- Coat pockets -->
  <rect x="118" y="380" width="42" height="28" rx="5" fill="white" opacity="0.5" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="240" y="380" width="42" height="28" rx="5" fill="white" opacity="0.5" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Name badge / ID card on coat -->
  <rect x="145" y="390" width="50" height="34" rx="5" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <rect x="148" y="393" width="44" height="5" rx="2" fill="#3B82F6" opacity="0.7"/>
  <rect x="148" y="400" width="35" height="3" rx="1" fill="#93C5FD" opacity="0.6"/>
  <rect x="148" y="406" width="28" height="3" rx="1" fill="#93C5FD" opacity="0.4"/>
  <circle cx="167" cy="420" r="4" fill="#3B82F6" opacity="0.5"/>

  <!-- Stethoscope chest piece on scrubs -->
  <circle cx="208" cy="355" r="10" fill="#374151"/>
  <circle cx="208" cy="355" r="7" fill="#4B5563"/>
  <circle cx="208" cy="355" r="3" fill="#6B7280"/>
</svg>
